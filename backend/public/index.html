<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Конституция РФ</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      min-height: 100dvh;
      overscroll-behavior: none;
    }

    /* ---------- Search bar ---------- */
    .search-bar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--tg-theme-bg-color, #fff);
      padding: 10px 12px;
      border-bottom: 1px solid var(--tg-theme-secondary-bg-color, #f1f1f1);
    }
    .search-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .search-icon {
      position: absolute;
      left: 10px;
      width: 18px;
      height: 18px;
      opacity: 0.4;
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      height: 40px;
      padding: 0 34px 0 36px;
      border-radius: 10px;
      border: none;
      background: var(--tg-theme-secondary-bg-color, #f1f1f1);
      color: var(--tg-theme-text-color, #000);
      font-size: 16px;
      outline: none;
      -webkit-appearance: none;
    }
    .search-input::placeholder { color: var(--tg-theme-hint-color, #aaa); }
    .search-input::-webkit-search-cancel-button { display: none; }
    .clear-btn {
      position: absolute;
      right: 6px;
      background: none;
      border: none;
      font-size: 18px;
      color: var(--tg-theme-hint-color, #aaa);
      cursor: pointer;
      padding: 4px 6px;
      line-height: 1;
    }

    /* ---------- Results ---------- */
    .results {
      padding: 8px 12px 32px;
    }
    .hint {
      text-align: center;
      font-size: 14px;
      color: var(--tg-theme-hint-color, #999);
      padding: 40px 0;
    }
    .err { color: #e53935; }

    /* ---------- Card ---------- */
    .card {
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      border-radius: 14px;
      padding: 12px 14px;
      margin-bottom: 8px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }
    .card:active { opacity: 0.65; }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .art-num {
      font-size: 13px;
      font-weight: 700;
      color: var(--tg-theme-button-color, #2481cc);
    }
    .art-chapter {
      font-size: 12px;
      color: var(--tg-theme-hint-color, #999);
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 5px;
      line-height: 1.35;
    }
    .card-snippet {
      font-size: 13px;
      color: var(--tg-theme-hint-color, #999);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-snippet b {
      color: var(--tg-theme-text-color, #000);
      font-weight: 600;
    }

    /* ---------- Modal (bottom sheet) ---------- */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: flex-end;
    }
    .sheet {
      background: var(--tg-theme-bg-color, #fff);
      border-radius: 18px 18px 0 0;
      width: 100%;
      max-height: 92dvh;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding-bottom: env(safe-area-inset-bottom, 16px);
    }
    .sheet-header {
      padding: 18px 16px 12px;
      border-bottom: 1px solid var(--tg-theme-secondary-bg-color, #f1f1f1);
      position: sticky;
      top: 0;
      background: var(--tg-theme-bg-color, #fff);
    }
    .sheet-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      color: var(--tg-theme-button-color, #2481cc);
      background: var(--tg-theme-secondary-bg-color, #e8f0fe);
      border-radius: 6px;
      padding: 2px 8px;
      margin-bottom: 8px;
    }
    .sheet-header h2 { font-size: 20px; font-weight: 700; margin-bottom: 3px; }
    .sheet-subtitle { font-size: 13px; color: var(--tg-theme-hint-color, #999); }
    .sheet-body {
      padding: 16px;
    }
    .sheet-body p {
      font-size: 15px;
      line-height: 1.75;
      margin-bottom: 10px;
    }
    .loading {
      text-align: center;
      color: var(--tg-theme-hint-color, #999);
      padding: 32px;
      font-size: 14px;
    }

    .welcome {
      padding: 16px 2px 14px;
    }
    .welcome-title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .welcome-sub {
      font-size: 13px;
      color: var(--tg-theme-hint-color, #999);
      line-height: 1.55;
    }
    .card--dim { opacity: 0.7; }

    /* ---------- Star / Favorites ---------- */
    .star-btn {
      position: absolute;
      top: 14px;
      right: 14px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      color: var(--tg-theme-hint-color, #ccc);
      -webkit-tap-highlight-color: transparent;
      line-height: 0;
    }
    .star-btn.starred { color: #f5a623; }
    @keyframes star-pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.5); }
      100% { transform: scale(1); }
    }
    .star-pop { animation: star-pop 0.28s ease; }
    .fav-empty {
      text-align: center;
      padding: 48px 16px;
      font-size: 14px;
      color: var(--tg-theme-hint-color, #999);
      line-height: 1.6;
    }

    /* ---------- Action buttons row ---------- */
    .action-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .action-btn {
      flex: 1;
      height: 38px;
      border-radius: 10px;
      border: none;
      background: var(--tg-theme-secondary-bg-color, #f1f1f1);
      color: var(--tg-theme-text-color, #000);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }
    .action-btn:active { opacity: 0.65; }

    /* ---------- Rarity badge ---------- */
    .rarity-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      border-radius: 6px;
      padding: 2px 7px;
      white-space: nowrap;
    }
    .rarity-common    { color: #9e9e9e; background: rgba(158,158,158,0.13); }
    .rarity-uncommon  { color: #43a047; background: rgba(67,160,71,0.13); }
    .rarity-rare      { color: #1e88e5; background: rgba(30,136,229,0.13); }
    .rarity-epic      { color: #9c27b0; background: rgba(156,39,176,0.13); }
    .rarity-legendary { color: #f57c00; background: rgba(245,124,0,0.13); }
    .card-meta .rarity-badge { margin-left: auto; }

    /* sheet-header badges row */
    .sheet-header-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }
    .sheet-header-meta .sheet-badge { margin-bottom: 0; }

    .welcome-footer {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
      left: 0;
      right: 0;
      text-align: center;
      font-size: 12px;
      color: var(--tg-theme-hint-color, #999);
    }
    .welcome-footer a {
      color: var(--tg-theme-button-color, #2481cc);
      text-decoration: none;
    }

  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ---------------------------------------------------------------------------
// Rarity system
// ---------------------------------------------------------------------------

const RARITIES = {
  1:'legendary', 2:'legendary', 7:'legendary', 10:'legendary', 17:'legendary', 29:'legendary',
  3:'epic', 4:'epic', 13:'epic', 15:'epic', 18:'epic', 20:'epic', 21:'epic', 22:'epic',
  35:'epic', 46:'epic', 55:'epic', 80:'epic', 81:'epic', 93:'epic', 135:'epic',
  5:'rare', 6:'rare', 8:'rare', 9:'rare', 11:'rare', 12:'rare', 14:'rare', 16:'rare',
  19:'rare', 23:'rare', 25:'rare', 28:'rare', 31:'rare', 37:'rare', 40:'rare',
  41:'rare', 42:'rare', 43:'rare', 44:'rare', 45:'rare', 47:'rare', 65:'rare',
  94:'rare', 110:'rare', 118:'rare',
  24:'uncommon', 26:'uncommon', 27:'uncommon', 30:'uncommon', 32:'uncommon', 33:'uncommon',
  34:'uncommon', 36:'uncommon', 38:'uncommon', 39:'uncommon', 48:'uncommon', 49:'uncommon',
  50:'uncommon', 51:'uncommon', 52:'uncommon', 53:'uncommon', 54:'uncommon', 56:'uncommon',
  57:'uncommon', 58:'uncommon', 59:'uncommon', 60:'uncommon', 61:'uncommon', 62:'uncommon',
  63:'uncommon', 64:'uncommon', 66:'uncommon', 67:'uncommon', 68:'uncommon', 69:'uncommon',
  78:'uncommon', 79:'uncommon', 82:'uncommon', 83:'uncommon', 84:'uncommon', 85:'uncommon',
  86:'uncommon', 87:'uncommon', 88:'uncommon', 89:'uncommon',
};

const RARITY_LABELS = {
  common: 'Обычная', uncommon: 'Необычная', rare: 'Редкая',
  epic: 'Эпическая', legendary: 'Легендарная',
};

function getRarity(n) { return RARITIES[n] || 'common'; }

function RarityBadge({ n }) {
  const r = getRarity(n);
  return <span className={`rarity-badge rarity-${r}`}>{RARITY_LABELS[r]}</span>;
}

function tg() { return window.Telegram?.WebApp; }
function initData() { return tg()?.initData || ''; }

const headers = () => ({ 'x-init-data': initData() });

function useDebounce(val, ms) {
  const [v, setV] = useState(val);
  useEffect(() => { const t = setTimeout(() => setV(val), ms); return () => clearTimeout(t); }, [val, ms]);
  return v;
}

function useFavorites() {
  const [favs, setFavs] = useState(() => {
    try { return JSON.parse(localStorage.getItem('favs') || '[]'); } catch { return []; }
  });
  const isFav = useCallback((id) => favs.some(f => f.id === id), [favs]);
  const toggle = useCallback((article) => {
    setFavs(prev => {
      const next = prev.some(f => f.id === article.id)
        ? prev.filter(f => f.id !== article.id)
        : [...prev, { id: article.id, article_number: article.article_number, chapter: article.chapter, title: article.title }];
      localStorage.setItem('favs', JSON.stringify(next));
      return next;
    });
  }, []);
  return { favs, isFav, toggle };
}

// ---------------------------------------------------------------------------
// Article modal
// ---------------------------------------------------------------------------

function ArticleSheet({ id, isFav, onToggleFav, onClose }) {
  const [article, setArticle] = useState(null);
  const [err, setErr]         = useState(false);
  const [starAnim, setStarAnim] = useState(false);

  useEffect(() => {
    setArticle(null); setErr(false);
    fetch(`article/${id}`, { headers: headers() })
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(setArticle)
      .catch(() => setErr(true));
  }, [id]);

  useEffect(() => {
    const w = tg();
    if (!w) return;
    w.BackButton.show();
    w.BackButton.onClick(onClose);
    return () => { w.BackButton.hide(); w.BackButton.offClick(onClose); };
  }, [onClose]);

  function handleStar() {
    if (!article) return;
    tg()?.HapticFeedback?.selectionChanged();
    setStarAnim(true);
    setTimeout(() => setStarAnim(false), 300);
    onToggleFav(article);
  }

  const starred = isFav(id);

  return (
    <div className="overlay" onClick={onClose}>
      <div className="sheet" onClick={e => e.stopPropagation()}>
        {err && <p className="loading err">Не удалось загрузить</p>}
        {!article && !err && <p className="loading">Загрузка...</p>}
        {article && <>
          <div className="sheet-header">
            <button className={`star-btn${starred ? ' starred' : ''}`} onClick={handleStar}>
              <svg className={starAnim ? 'star-pop' : ''} width="22" height="22" viewBox="0 0 24 24"
                fill={starred ? 'currentColor' : 'none'} stroke="currentColor" strokeWidth="2">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
              </svg>
            </button>
            <div className="sheet-header-meta">
              <div className="sheet-badge">{article.chapter}</div>
              <RarityBadge n={article.article_number} />
            </div>
            <h2>Статья {article.article_number}</h2>
            <p className="sheet-subtitle">{article.title}</p>
          </div>
          <div className="sheet-body">
            {article.text.split('\n').map((line, i) =>
              line.trim() ? <p key={i}>{line.trim()}</p> : null
            )}
          </div>
        </>}
      </div>
    </div>
  );
}

// ---------------------------------------------------------------------------
// Favorites sheet
// ---------------------------------------------------------------------------

function FavoritesSheet({ favs, onOpen, onClose }) {
  useEffect(() => {
    const w = tg();
    if (!w) return;
    w.BackButton.show();
    w.BackButton.onClick(onClose);
    return () => { w.BackButton.hide(); w.BackButton.offClick(onClose); };
  }, [onClose]);

  return (
    <div className="overlay" onClick={onClose}>
      <div className="sheet" onClick={e => e.stopPropagation()}>
        <div className="sheet-header">
          <h2>Избранное</h2>
          {favs.length > 0 && <p className="sheet-subtitle">{favs.length} ст.</p>}
        </div>
        <div className="sheet-body">
          {favs.length === 0 && (
            <p className="fav-empty">Пока ничего нет.<br/>Нажмите ★ при чтении статьи.</p>
          )}
          {favs.map(item => (
            <div key={item.id} className="card" onClick={() => onOpen(item.id)}>
              <div className="card-meta">
                <span className="art-num">Ст. {item.article_number}</span>
                <span className="art-chapter">{item.chapter}</span>
                <RarityBadge n={item.article_number} />
              </div>
              <div className="card-title">{item.title}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ---------------------------------------------------------------------------
// Welcome screen — hardcoded, no fetch needed
// ---------------------------------------------------------------------------

const EXAMPLES = [
  { id: 22, article_number: 22, chapter: 'Глава 2', preview: 'Каждый имеет право на свободу и личную неприкосновенность. Арест допускается только по судебному решению.' },
  { id: 23, article_number: 23, chapter: 'Глава 2', preview: 'Каждый имеет право на неприкосновенность частной жизни, личную и семейную тайну, защиту чести и доброго имени.' },
  { id: 29, article_number: 29, chapter: 'Глава 2', preview: 'Каждому гарантируется свобода мысли и слова. Никто не может быть принуждён к выражению своих мнений.' },
];

function Welcome({ onOpen }) {
  return (
    <>
      <div className="welcome">
        <p className="welcome-title">Конституция РФ</p>
        <p className="welcome-sub">Поиск по номеру или словам. Поддерживается частичный ввод — например, «свобо» или «президе».</p>
      </div>
      <div className="examples">
        {EXAMPLES.map(item => (
          <div key={item.id} className="card card--dim" onClick={() => onOpen(item.id)}>
            <div className="card-meta">
              <span className="art-num">Ст. {item.article_number}</span>
              <span className="art-chapter">{item.chapter}</span>
              <RarityBadge n={item.article_number} />
            </div>
            <div className="card-snippet">{item.preview}</div>
          </div>
        ))}
      </div>
      <p className="welcome-footer">
        2026 lns.{' '}
        <a href="https://github.com/NikitaLGit/tg_miniapp_constitution" target="_blank" rel="noreferrer">github</a>
      </p>
    </>
  );
}

// ---------------------------------------------------------------------------
// Main App
// ---------------------------------------------------------------------------

function App() {
  const [query,    setQuery]    = useState('');
  const [results,  setResults]  = useState([]);
  const [loading,  setLoading]  = useState(false);
  const [err,      setErr]      = useState(false);
  const [selected, setSelected] = useState(null);
  const [showFavs, setShowFavs] = useState(false);
  const { favs, isFav, toggle } = useFavorites();
  const inputRef = useRef(null);

  const dq = useDebounce(query, 300);

  useEffect(() => { tg()?.ready(); tg()?.expand(); }, []);

  useEffect(() => {
    if (!dq.trim()) { setResults([]); return; }
    setLoading(true); setErr(false);
    fetch(`search?q=${encodeURIComponent(dq)}`, { headers: headers() })
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(data => { setResults(data); setLoading(false); })
      .catch(() => { setErr(true); setLoading(false); });
  }, [dq]);

  function clear() { setQuery(''); setResults([]); inputRef.current?.focus(); }
  function open(id) {
    setSelected(id);
    document.body.style.overflow = 'hidden';
    tg()?.HapticFeedback?.selectionChanged();
  }

  function close() {
    setSelected(null);
    document.body.style.overflow = '';
  }

  function openFavs() {
    setShowFavs(true);
    document.body.style.overflow = 'hidden';
  }

  function closeFavs() {
    setShowFavs(false);
    document.body.style.overflow = '';
  }

  function openFromFavs(id) {
    setShowFavs(false);
    open(id);
  }

  function openRandom() {
    tg()?.HapticFeedback?.selectionChanged();
    fetch('random', { headers: headers() })
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(data => open(data.id))
      .catch(() => {});
  }

  return (
    <>
      <div className="search-bar">
        <div className="search-wrap">
          <svg className="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input
            ref={inputRef}
            type="search"
            className="search-input"
            placeholder="Номер статьи или слово..."
            value={query}
            onChange={e => setQuery(e.target.value)}
            autoFocus
          />
          {query && <button className="clear-btn" onClick={clear}>×</button>}
        </div>
      </div>

      <div className="results">
        {!query && <>
          <div className="action-row">
            <button className="action-btn" onClick={openRandom}>Мне повезёт</button>
            <button className="action-btn" onClick={openFavs}>Избранное{favs.length > 0 ? ` ${favs.length}` : ''}</button>
          </div>
          <Welcome onOpen={open} />
        </>}
        {query && loading && <p className="hint">Поиск...</p>}
        {query && !loading && err && <p className="hint err">Ошибка поиска</p>}
        {query && !loading && !err && results.length === 0 && <p className="hint">Ничего не найдено</p>}

        {results.map(item => (
          <div key={item.id} className="card" onClick={() => open(item.id)}>
            <div className="card-meta">
              <span className="art-num">Ст. {item.article_number}</span>
              <span className="art-chapter">{item.chapter}</span>
              <RarityBadge n={item.article_number} />
            </div>
            <div className="card-title">{item.title}</div>
            <div
              className="card-snippet"
              dangerouslySetInnerHTML={{ __html: item.snippet || '' }}
            />
          </div>
        ))}
      </div>

      {selected && (
        <ArticleSheet id={selected} isFav={isFav} onToggleFav={toggle} onClose={close} />
      )}
      {showFavs && (
        <FavoritesSheet favs={favs} onOpen={openFromFavs} onClose={closeFavs} />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
